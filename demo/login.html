<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AI Talent Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="public-page">
  
  <header class="public-header" style="justify-content: center; background: var(--bg-primary); border-bottom: none; padding-top: 40px;">
    <div class="brand-icon" style="width: 48px; height: 48px; font-size: 24px;">🧪</div>
    <div class="brand-text">
      <h1 style="font-size: 20px;">AI Talent Lab</h1>
    </div>
  </header>

  <main class="public-content">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p>Sign in to manage your hiring pipeline</p>
      
      <form onsubmit="event.preventDefault(); window.location.href='index.html';">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="input" placeholder="name@company.com" required>
        </div>
        <div class="form-group mb-24">
          <div class="flex justify-between items-center mb-4">
            <label style="margin-bottom: 0;">Password</label>
            <a href="#" class="text-xs text-primary" style="color: var(--accent-primary);">Forgot password?</a>
          </div>
          <input type="password" class="input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary w-full btn-lg mb-16">Sign In</button>
        
        <div style="position: relative; text-align: center; margin: 24px 0;">
          <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); z-index: 1;"></div>
          <span style="position: relative; z-index: 2; background: var(--bg-secondary); padding: 0 12px; color: var(--text-secondary); font-size: 13px;">or</span>
        </div>
        
        <button type="button" class="btn btn-secondary w-full btn-lg flex items-center justify-center gap-12" onclick="window.location.href='index.html'">
          <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            <path d="M1 1h22v22H1z" fill="none"/>
          </svg>
          Sign in with Google
        </button>
      </form>
      
      <p class="text-center mt-24 text-sm" style="margin-bottom: 0;">
        Don't have an account? <a href="#" style="color: var(--accent-primary); font-weight: 600;">Contact Sales</a>
      </p>
    </div>
  </main>
</body>
</html>
