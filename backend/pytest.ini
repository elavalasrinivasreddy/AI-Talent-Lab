[pytest]
asyncio_mode = auto
filterwarnings =
    ignore:Failing to pass a value to the 'type_params' parameter of 'typing.ForwardRef._evaluate' is deprecated:DeprecationWarning:pydantic\.v1\.typing
    ignore:legacy embedding function config.*is_legacy:DeprecationWarning:chromadb\.api\.collection_configuration
    ignore:Using `httpx` with `starlette\.testclient` is deprecated.*:DeprecationWarning
