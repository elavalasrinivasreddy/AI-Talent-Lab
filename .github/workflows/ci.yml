name: CI

# pytest + lint on every push; Playwright E2E on PRs (heavier, needs the full
# stack). Mirrors the Makefile targets so local and CI stay in lockstep.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + typed test suite with coverage floor ───────────────────
  backend:
    name: Backend (lint + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check backend

      # testcontainers spins up its own Postgres via the runner's Docker daemon;
      # Redis is mocked in conftest, so no service containers are needed here.
      - name: Run backend tests with coverage floor
        env:
          JWT_SECRET: ci-test-secret-not-for-prod
          APP_DB_PASSWORD: ci-test-password
          DATABASE_URL: postgresql://ci@localhost:5432/ci
        run: |
          pip install pytest-cov
          pytest --cov=backend --cov-report=term-missing \
                 --cov-fail-under=${COV_MIN:-37} backend/tests
        # COV_MIN tracks the Makefile baseline (37). Bump as coverage grows.

  # ── Frontend: lint + unit tests + production build ─────────────────────────
  frontend:
    name: Frontend (lint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build
        run: npm run build

  # ── E2E: Playwright core-loop against the full stack (PRs only) ────────────
  e2e:
    name: E2E (Playwright)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: talentlab
          POSTGRES_PASSWORD: talentlab
          POSTGRES_DB: talentlab
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U talentlab"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DEV_MODE: "true"
      JWT_SECRET: ci-test-secret-not-for-prod
      APP_DB_PASSWORD: talentlab
      DATABASE_URL: postgresql://talentlab:talentlab@localhost:5432/talentlab
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend + frontend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          cd frontend && npm ci && npx playwright install --with-deps chromium

      - name: Run Playwright core-loop (make e2e)
        run: make e2e
